<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arqueo de Caja</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #f8f5ef;
    --cream: #ede9e0;
    --gold: #b8860b;
    --gold-light: #d4a017;
    --red: #c0392b;
    --green: #1a6b3c;
    --border: #c8c0b0;
    --muted: #6b6455;
    --accent: #2c5f8a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  /* Subtle ruled paper texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      transparent,
      transparent 27px,
      rgba(180,165,140,0.18) 27px,
      rgba(180,165,140,0.18) 28px
    );
    pointer-events: none;
    z-index: 0;
  }

  .app-wrap {
    max-width: 860px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 2rem 0 1.5rem;
    border-bottom: 3px double var(--gold);
    margin-bottom: 2rem;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--ink);
  }

  header .subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 0.4rem;
  }

  /* SECTIONS */
  .section {
    background: white;
    border: 1px solid var(--border);
    border-top: 4px solid var(--gold);
    margin-bottom: 1.8rem;
    padding: 1.5rem 1.6rem;
    box-shadow: 2px 3px 12px rgba(0,0,0,0.06);
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-title .num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    background: var(--gold);
    color: white;
    border-radius: 50%;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* TABLE */
  .sobre-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
    margin-bottom: 0.8rem;
  }

  .sobre-table th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 2px solid var(--border);
    padding: 0.4rem 0.6rem;
    text-align: left;
    background: var(--cream);
  }

  .sobre-table th:last-child, .sobre-table td:last-child { text-align: right; }
  .sobre-table th:first-child, .sobre-table td:first-child { width: 50px; text-align: center; }

  .sobre-table td {
    padding: 0.35rem 0.6rem;
    border-bottom: 1px solid #ebe5d8;
    vertical-align: middle;
  }

  .sobre-table tr:hover td { background: #fdf9f2; }

  .sobre-table input[type="text"],
  .sobre-table input[type="number"] {
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--ink);
    padding: 2px 4px;
    outline: none;
  }

  .sobre-table input:focus {
    background: #fff8e7;
    border-radius: 3px;
  }

  .sobre-table .row-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .sobre-table .del-btn {
    background: none;
    border: none;
    color: #ccc;
    cursor: pointer;
    font-size: 1rem;
    padding: 0 4px;
    line-height: 1;
    transition: color 0.2s;
  }
  .sobre-table .del-btn:hover { color: var(--red); }

  .total-row td {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 0.85rem;
    border-top: 2px solid var(--border) !important;
    border-bottom: none !important;
    background: var(--cream) !important;
    padding: 0.5rem 0.6rem;
  }

  .add-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    background: none;
    border: 1.5px dashed var(--gold);
    color: var(--gold);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.82rem;
    padding: 0.35rem 0.9rem;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
    margin-top: 0.3rem;
  }
  .add-btn:hover { background: #fffbf0; border-color: var(--gold-light); }

  /* DENOMINACIONES */
  .denom-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.7rem;
  }

  .denom-item {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .denom-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .denom-row {
    display: flex;
    align-items: center;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    background: white;
  }

  .denom-row:focus-within { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(184,134,11,0.1); }

  .denom-badge {
    padding: 0.4rem 0.5rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    background: var(--cream);
    border-right: 1px solid var(--border);
    white-space: nowrap;
    color: var(--ink);
    min-width: 60px;
    text-align: center;
  }

  .denom-row input {
    flex: 1;
    border: none;
    padding: 0.4rem 0.5rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    width: 100%;
    outline: none;
    background: white;
    color: var(--ink);
  }

  .denom-subtotal {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    text-align: right;
    min-height: 1rem;
  }

  .denom-section-header {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin: 1rem 0 0.5rem;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid #d0e4f0;
  }

  .denom-total-box {
    margin-top: 1.2rem;
    text-align: right;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.88rem;
    color: var(--muted);
  }

  .denom-total-box span {
    font-size: 1rem;
    color: var(--ink);
    font-weight: 500;
  }

  /* CUADRE BANNER */
  .cuadre-box {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    border: 2px solid var(--border);
    border-radius: 6px;
    padding: 1rem 1.5rem;
    background: white;
    margin-bottom: 1.8rem;
    flex-wrap: wrap;
  }

  .cuadre-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
  }

  .cuadre-item .cl { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .cuadre-item .cv { font-family: 'IBM Plex Mono', monospace; font-size: 1.1rem; font-weight: 500; color: var(--ink); }

  .cuadre-status {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    font-weight: 500;
    padding: 0.5rem 1rem;
    border-radius: 4px;
    transition: all 0.3s;
  }

  .cuadre-status.ok { background: #e8f5ee; color: var(--green); border: 1px solid #a8d5bb; }
  .cuadre-status.error { background: #fdecea; color: var(--red); border: 1px solid #f4b8b3; }
  .cuadre-status.neutral { background: var(--cream); color: var(--muted); border: 1px solid var(--border); }

  .cuadre-dif { font-family: 'IBM Plex Mono', monospace; font-size: 1rem; font-weight: 500; }
  .cuadre-dif.ok { color: var(--green); }
  .cuadre-dif.error { color: var(--red); }

  /* PERSONAS */
  .personas-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.8rem;
  }

  @media (max-width: 540px) {
    .personas-grid { grid-template-columns: 1fr; }
    .denom-grid { grid-template-columns: 1fr 1fr; }
  }

  .persona-slot {
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .persona-role {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    background: var(--cream);
    padding: 0.35rem 0.7rem;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
  }

  .persona-slot input {
    width: 100%;
    border: none;
    padding: 0.55rem 0.7rem;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.88rem;
    outline: none;
    background: white;
    color: var(--ink);
  }

  .persona-slot input:focus { background: #fffbf0; }

  .persona-add-row {
    margin-top: 0.8rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .role-select {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.4rem 0.6rem;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.85rem;
    background: white;
    color: var(--ink);
    outline: none;
    cursor: pointer;
  }

  .role-select:focus { border-color: var(--gold); }

  .personas-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 0.8rem;
  }

  .persona-entry {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    background: white;
  }

  .persona-entry .role-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: var(--cream);
    padding: 0.45rem 0.6rem;
    border-right: 1px solid var(--border);
    color: var(--muted);
    white-space: nowrap;
    min-width: 80px;
    text-align: center;
  }

  .persona-entry .role-tag.anciano { background: #eef2ff; color: #3949ab; border-color: #c5cae9; }
  .persona-entry .role-tag.tesorero { background: #fff8e1; color: #f57f17; border-color: #ffe082; }
  .persona-entry .role-tag.diacono { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }

  .persona-entry input {
    flex: 1;
    border: none;
    padding: 0.45rem 0.6rem;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.88rem;
    outline: none;
  }
  .persona-entry input:focus { background: #fffbf0; }

  /* PRINT BUTTON */
  .print-btn {
    display: block;
    width: 100%;
    padding: 1rem;
    background: var(--ink);
    color: var(--paper);
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    margin-bottom: 2rem;
    transition: all 0.2s;
  }

  .print-btn:hover { background: #2c2c4e; }
  .pdf-btn { background: #1a6b3c !important; }
  .pdf-btn:hover { background: #145530 !important; }

  /* CURRENCY FORMAT */
  .currency { font-family: 'IBM Plex Mono', monospace; }

  /* PRINT PREVIEW */
  #print-preview {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    overflow: auto;
    padding: 2rem;
  }

  .print-doc {
    background: white;
    max-width: 800px;
    margin: 0 auto;
    padding: 2.5rem;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.88rem;
    color: #111;
    position: relative;
  }

  .print-close {
    position: sticky;
    top: -2rem;
    float: right;
    background: var(--ink);
    color: white;
    border: none;
    padding: 0.4rem 0.9rem;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    border-radius: 3px;
    z-index: 10;
    margin-bottom: 1rem;
  }

  .print-actions {
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
    margin-bottom: 1rem;
  }

  .print-actions button {
    background: var(--ink);
    color: white;
    border: none;
    padding: 0.45rem 1rem;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    border-radius: 3px;
  }

  .print-actions .close-btn { background: var(--muted); }
</style>
</head>
<body>

<div class="app-wrap">

  <header>
    <h1>Arqueo de Caja</h1>
    <div class="subtitle">Registro y control de efectivo</div>
  </header>

  <!-- CUADRE BANNER -->
  <div class="cuadre-box">
    <div class="cuadre-item">
      <span class="cl">Total Sobres</span>
      <span class="cv currency" id="total-sobres-disp">$ 0</span>
    </div>
    <div class="cuadre-item">
      <span class="cl">Total Efectivo</span>
      <span class="cv currency" id="total-efectivo-disp">$ 0</span>
    </div>
    <div class="cuadre-item">
      <span class="cl">Diferencia</span>
      <span class="cv cuadre-dif neutral" id="cuadre-dif">$ 0</span>
    </div>
    <div class="cuadre-status neutral" id="cuadre-status">
      <span id="cuadre-icon">◯</span>
      <span id="cuadre-msg">Pendiente</span>
    </div>
  </div>

  <!-- SECCIÓN 1: SOBRES -->
  <div class="section">
    <div class="section-title"><span class="num">1</span> Registro de Sobres</div>
    <table class="sobre-table">
      <thead>
        <tr>
          <th>#</th>
          <th style="text-align:right">Valor (COP)</th>
          <th style="width:32px"></th>
        </tr>
      </thead>
      <tbody id="sobres-tbody">
      </tbody>
      <tfoot>
        <tr class="total-row">
          <td style="text-align:right">TOTAL SOBRES</td>
          <td id="sobre-total" style="text-align:right">$ 0</td>
          <td></td>
        </tr>
      </tfoot>
    </table>
    <button class="add-btn" onclick="addSobre()">＋ Añadir sobre</button>
  </div>

  <!-- SECCIÓN 2: BILLETES Y MONEDAS -->
  <div class="section">
    <div class="section-title"><span class="num">2</span> Conteo de Billetes y Monedas</div>

    <div class="denom-section-header">📄 Billetes</div>
    <div class="denom-grid" id="billetes-grid"></div>

    <div class="denom-section-header">🪙 Monedas</div>
    <div class="denom-grid" id="monedas-grid"></div>

    <div class="denom-total-box">
      Total efectivo: <span id="efectivo-total">$ 0</span>
    </div>
  </div>

  <!-- SECCIÓN 3: PERSONAS -->
  <div class="section">
    <div class="section-title"><span class="num">3</span> Personas que diligenciaron</div>
    <div class="personas-list" id="personas-list"></div>
    <div class="persona-add-row">
      <select class="role-select" id="new-role">
        <option value="anciano">Anciano</option>
        <option value="tesorero">Tesorero</option>
        <option value="diacono">Diácono</option>
      </select>
      <input type="text" id="new-nombre" placeholder="Nombre completo" style="flex:1; border:1px solid var(--border); border-radius:4px; padding:0.4rem 0.7rem; font-family:'IBM Plex Sans',sans-serif; font-size:0.88rem; outline:none;">
      <button class="add-btn" onclick="addPersona()" style="margin-top:0;">＋ Agregar</button>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;margin-bottom:2rem">
    <button class="print-btn" onclick="openPrint()" style="margin-bottom:0">⎙ Vista de impresión</button>
    <button class="print-btn pdf-btn" onclick="openPdf()" style="margin-bottom:0">⬇ Descargar PDF carta</button>
  </div>

</div>

<!-- PRINT PREVIEW -->
<div id="print-preview">
  <div class="print-doc">

    <div id="print-content"></div>
  </div>
</div>

<style>
@page {
  size: letter portrait;
  margin: 1.5cm 1.8cm;
}
@media print {
  body > .app-wrap { display: none; }
  #print-preview {
    display: block !important;
    position: static !important;
    background: white !important;
    padding: 0 !important;
  }
  .print-doc {
    padding: 0 !important;
    box-shadow: none !important;
    max-width: 100% !important;
  }
  .print-actions { display: none !important; }
  /* Evitar cortes dentro de bloques de firma */
  .firma-block { page-break-inside: avoid; break-inside: avoid; }
}
</style>

<script>
// ─── DATA ───────────────────────────────────────────────
const billetes = [100000, 50000, 20000, 10000, 5000, 2000, 1000];
const monedas  = [1000, 500, 200, 100, 50];

let sobresData = []; // {id, sobre, valor}
let denomData  = {}; // key: denom value, val: cantidad
let personasData = []; // {id, rol, nombre}
let sobreCounter = 0;
let personaCounter = 0;

// ─── FORMATEO ───────────────────────────────────────────
function fmt(n) {
  if (!n && n !== 0) return '$ 0';
  return '$ ' + Math.round(n).toLocaleString('es-CO');
}

function parseVal(s) {
  if (!s) return 0;
  const n = parseFloat(String(s).replace(/[^\d.,-]/g,'').replace(',','.'));
  return isNaN(n) ? 0 : n;
}

// ─── SOBRES ─────────────────────────────────────────────
function addSobre() {
  sobreCounter++;
  const id = sobreCounter;
  sobresData.push({ id, sobre: '', valor: 0 });
  renderSobres();
  // focus new row
  setTimeout(() => {
    const inp = document.querySelector(`#sobre-desc-${id}`);
    if (inp) inp.focus();
  }, 50);
}

function deleteSobre(id) {
  sobresData = sobresData.filter(r => r.id !== id);
  renderSobres();
  recalc();
}

function renderSobres() {
  const tbody = document.getElementById('sobres-tbody');
  tbody.innerHTML = '';
  sobresData.forEach((row, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="row-num" style="text-align:center">Sobre ${i + 1}</td>
      <td><input type="number" id="sobre-val-${row.id}" value="${row.valor || ''}" placeholder="0" min="0" step="100" style="text-align:right" oninput="updateSobre(${row.id},this.value)"></td>
      <td><button class="del-btn" onclick="deleteSobre(${row.id})" title="Eliminar">✕</button></td>
    `;
    tbody.appendChild(tr);
  });
  recalc();
}

function updateSobre(id, val) {
  const row = sobresData.find(r => r.id === id);
  if (!row) return;
  row.valor = parseVal(val);
  recalc();
}

// ─── DENOMINACIONES ─────────────────────────────────────
function buildDenomGrid() {
  [...billetes, ...monedas].forEach(d => { denomData[d] = 0; });

  function renderGroup(ids, containerId) {
    const grid = document.getElementById(containerId);
    grid.innerHTML = '';
    ids.forEach(d => {
      const div = document.createElement('div');
      div.className = 'denom-item';
      div.innerHTML = `
        <div class="denom-label">Cantidad de ${d < 1000 ? d : (d >= 1000 ? fmtDenom(d) : d)}</div>
        <div class="denom-row">
          <span class="denom-badge">${fmtDenom(d)}</span>
          <input type="number" min="0" step="1" placeholder="0" id="denom-${d}"
            oninput="updateDenom(${d}, this.value)">
        </div>
        <div class="denom-subtotal" id="sub-${d}"></div>
      `;
      grid.appendChild(div);
    });
  }

  renderGroup(billetes, 'billetes-grid');
  renderGroup(monedas, 'monedas-grid');
}

function fmtDenom(n) {
  if (n >= 1000) return '$ ' + (n / 1000).toLocaleString('es-CO') + 'K';
  return '$ ' + n;
}

function updateDenom(denom, val) {
  denomData[denom] = Math.max(0, parseInt(val) || 0);
  const sub = document.getElementById(`sub-${denom}`);
  const qty = denomData[denom];
  sub.textContent = qty > 0 ? fmt(qty * denom) : '';
  recalc();
}

// ─── PERSONAS ───────────────────────────────────────────
function addPersona() {
  const rol = document.getElementById('new-role').value;
  const nombre = document.getElementById('new-nombre').value.trim();
  if (!nombre) { document.getElementById('new-nombre').focus(); return; }
  personaCounter++;
  personasData.push({ id: personaCounter, rol, nombre });
  document.getElementById('new-nombre').value = '';
  renderPersonas();
}

function deletePersona(id) {
  personasData = personasData.filter(p => p.id !== id);
  renderPersonas();
}

const rolLabel = { anciano: 'Anciano', tesorero: 'Tesorero', diacono: 'Diácono' };

function renderPersonas() {
  const list = document.getElementById('personas-list');
  list.innerHTML = '';
  if (personasData.length === 0) {
    list.innerHTML = '<div style="font-size:0.82rem;color:var(--muted);padding:0.4rem 0">No hay personas registradas aún.</div>';
    return;
  }
  personasData.forEach(p => {
    const div = document.createElement('div');
    div.className = 'persona-entry';
    div.innerHTML = `
      <span class="role-tag ${p.rol}">${rolLabel[p.rol]}</span>
      <input type="text" value="${escHtml(p.nombre)}" oninput="updatePersona(${p.id},this.value)">
      <button class="del-btn" onclick="deletePersona(${p.id})" style="padding:0 0.6rem" title="Eliminar">✕</button>
    `;
    list.appendChild(div);
  });
}

function updatePersona(id, val) {
  const p = personasData.find(x => x.id === id);
  if (p) p.nombre = val;
}

// ─── RECALC ─────────────────────────────────────────────
function recalc() {
  // Sobres total
  const totalSobres = sobresData.reduce((s, r) => s + (r.valor || 0), 0);
  document.getElementById('sobre-total').textContent = fmt(totalSobres);
  document.getElementById('total-sobres-disp').textContent = fmt(totalSobres);

  // Efectivo total
  const totalEfectivo = Object.entries(denomData).reduce((s,[d,q]) => s + (parseInt(d) * q), 0);
  document.getElementById('efectivo-total').textContent = fmt(totalEfectivo);
  document.getElementById('total-efectivo-disp').textContent = fmt(totalEfectivo);

  // Cuadre
  const dif = totalEfectivo - totalSobres;
  const difEl = document.getElementById('cuadre-dif');
  const statusEl = document.getElementById('cuadre-status');
  const iconEl = document.getElementById('cuadre-icon');
  const msgEl = document.getElementById('cuadre-msg');

  difEl.textContent = fmt(Math.abs(dif));

  if (totalSobres === 0 && totalEfectivo === 0) {
    difEl.className = 'cuadre-dif';
    statusEl.className = 'cuadre-status neutral';
    iconEl.textContent = '◯'; msgEl.textContent = 'Pendiente';
  } else if (dif === 0) {
    difEl.className = 'cuadre-dif ok';
    statusEl.className = 'cuadre-status ok';
    iconEl.textContent = '✓'; msgEl.textContent = '¡Cuadre exacto!';
  } else {
    difEl.className = 'cuadre-dif error';
    statusEl.className = 'cuadre-status error';
    const who = dif > 0 ? `Efectivo sobra ${fmt(Math.abs(dif))}` : `Efectivo falta ${fmt(Math.abs(dif))}`;
    iconEl.textContent = '✗'; msgEl.textContent = who;
  }
}

// ─── IMPRESIÓN ──────────────────────────────────────────
function openPrint() {
  const totalSobres = sobresData.reduce((s, r) => s + (r.valor || 0), 0);
  const totalEfectivo = Object.entries(denomData).reduce((s,[d,q]) => s + (parseInt(d)*q), 0);
  const dif = totalEfectivo - totalSobres;

  const now = new Date();
  const fecha = now.toLocaleDateString('es-CO', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  const hora  = now.toLocaleTimeString('es-CO', { hour:'2-digit', minute:'2-digit' });

  const cuadreColor = dif === 0 ? '#1a6b3c' : '#c0392b';
  const cuadreMsg   = dif === 0 ? '✓ Cuadre exacto' : (dif > 0 ? `✗ Efectivo sobra ${fmt(Math.abs(dif))}` : `✗ Efectivo falta ${fmt(Math.abs(dif))}`);

  }).filter(Boolean).join('');

  // Monedas
  let monedaRows = monedas.map(d => {
    const q = denomData[d] || 0;
    if (q === 0) return '';
    return `<tr><td style="padding:2px 4px;font-size:0.7rem;border-bottom:1px solid #f0f0f0">${fmtDenom(d)}</td><td style="padding:2px 4px;text-align:center;font-size:0.7rem;border-bottom:1px solid #f0f0f0">${q}</td><td style="padding:2px 4px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:0.7rem;border-bottom:1px solid #f0f0f0">${fmt(d*q)}</td></tr>`;
  }).filter(Boolean).join('');
  if (!monedaRows) monedaRows = '<tr><td colspan="3" style="padding:2px 4px;color:#999;font-style:italic;font-size:0.68rem">Sin monedas</td></tr>';

  // Firmas con espacio generoso
  let firmasHtml = personasData.length > 0
    ? personasData.map(p => `
        <div style="margin-bottom:14px">
          <div style="height:38px"></div>
          <div style="border-bottom:1px solid #333;margin-bottom:4px"></div>
          <div style="font-size:0.72rem;font-weight:500">${escHtml(p.nombre)}</div>
          <div style="font-size:0.58rem;text-transform:uppercase;letter-spacing:0.07em;color:#888;margin-top:1px">${rolLabel[p.rol]}</div>
        </div>`).join('')
    : '<p style="color:#999;font-style:italic;font-size:0.72rem">Sin personas registradas</p>';

  const html = `
    <div style="font-family:'IBM Plex Sans',sans-serif;color:#111;font-size:10px;line-height:1.3">

      <!-- ENCABEZADO compacto -->
      <div style="display:flex;align-items:baseline;justify-content:space-between;border-bottom:2px solid #b8860b;padding-bottom:5px;margin-bottom:8px">
        <h1 style="font-family:'Playfair Display',serif;font-size:1.25rem;margin:0;font-weight:700">Arqueo de Caja</h1>
        <span style="font-size:0.65rem;color:#666;letter-spacing:0.06em;text-transform:uppercase">${fecha} — ${hora}</span>
      </div>

      <!-- RESUMEN CUADRE compacto: una fila inline -->
      <div style="display:flex;gap:8px;margin-bottom:10px;align-items:stretch">
        <div style="border:1px solid #ddd;border-radius:3px;padding:4px 10px;display:flex;align-items:center;gap:6px">
          <span style="font-size:0.6rem;text-transform:uppercase;letter-spacing:0.06em;color:#888">Sobres:</span>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:0.82rem;font-weight:600">${fmt(totalSobres)}</span>
        </div>
        <div style="border:1px solid #ddd;border-radius:3px;padding:4px 10px;display:flex;align-items:center;gap:6px">
          <span style="font-size:0.6rem;text-transform:uppercase;letter-spacing:0.06em;color:#888">Efectivo:</span>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:0.82rem;font-weight:600">${fmt(totalEfectivo)}</span>
        </div>
        <div style="border:2px solid ${cuadreColor};border-radius:3px;padding:4px 12px;display:flex;align-items:center;gap:6px;background:${dif===0?'#e8f5ee':'#fdecea'}">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:0.82rem;font-weight:700;color:${cuadreColor}">${cuadreMsg}</span>
        </div>
      </div>

      <!-- CUERPO: DOS COLUMNAS -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start">

        <!-- COLUMNA IZQUIERDA: SOBRES -->
        <div>
          <div style="font-family:'Playfair Display',serif;font-size:0.82rem;font-weight:600;border-bottom:1.5px solid #b8860b;padding-bottom:3px;margin-bottom:6px">Sobres</div>
          <table style="width:100%;border-collapse:collapse">
            <thead>
              <tr style="background:#f5f2eb">
                <th style="padding:3px 6px;text-align:left;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.05em;color:#666;border-bottom:1.5px solid #ddd">Sobre</th>
                <th style="padding:3px 6px;text-align:right;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.05em;color:#666;border-bottom:1.5px solid #ddd">Valor (COP)</th>
              </tr>
            </thead>
            <tbody>${sobresRows}</tbody>
            <tfoot>
              <tr style="background:#f5f2eb">
                <td style="padding:3px 6px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:0.62rem;text-transform:uppercase;border-top:1.5px solid #ccc">Total</td>
                <td style="padding:3px 6px;text-align:right;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:0.75rem;border-top:1.5px solid #ccc">${fmt(totalSobres)}</td>
              </tr>
            </tfoot>
          </table>
        </div>

        <!-- COLUMNA DERECHA: EFECTIVO + FIRMAS -->
        <div style="display:flex;flex-direction:column;gap:10px">

          <!-- EFECTIVO -->
          <div>
            <div style="font-family:'Playfair Display',serif;font-size:0.82rem;font-weight:600;border-bottom:1.5px solid #b8860b;padding-bottom:3px;margin-bottom:6px">Conteo de Efectivo</div>
            <div style="font-size:0.58rem;text-transform:uppercase;letter-spacing:0.07em;color:#2c5f8a;margin-bottom:3px;padding-bottom:2px;border-bottom:1px solid #d0e4f0">Billetes</div>
            <table style="width:100%;border-collapse:collapse;margin-bottom:6px">
              <thead><tr>
                <th style="text-align:left;padding:2px 4px;font-size:0.58rem;color:#888;border-bottom:1px solid #eee">Denom.</th>
                <th style="text-align:center;padding:2px 4px;font-size:0.58rem;color:#888;border-bottom:1px solid #eee">Cant.</th>
                <th style="text-align:right;padding:2px 4px;font-size:0.58rem;color:#888;border-bottom:1px solid #eee">Subtotal</th>
              </tr></thead>
              <tbody>${billeteRows}</tbody>
            </table>
            <div style="font-size:0.58rem;text-transform:uppercase;letter-spacing:0.07em;color:#2c5f8a;margin-bottom:3px;padding-bottom:2px;border-bottom:1px solid #d0e4f0">Monedas</div>
            <table style="width:100%;border-collapse:collapse;margin-bottom:6px">
              <thead><tr>
                <th style="text-align:left;padding:2px 4px;font-size:0.58rem;color:#888;border-bottom:1px solid #eee">Denom.</th>
                <th style="text-align:center;padding:2px 4px;font-size:0.58rem;color:#888;border-bottom:1px solid #eee">Cant.</th>
                <th style="text-align:right;padding:2px 4px;font-size:0.58rem;color:#888;border-bottom:1px solid #eee">Subtotal</th>
              </tr></thead>
              <tbody>${monedaRows}</tbody>
            </table>
            <div style="text-align:right;font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:#444;border-top:1.5px solid #ccc;padding-top:3px">
              Total: <strong>${fmt(totalEfectivo)}</strong>
            </div>
          </div>

          <!-- FIRMAS -->
          <div>
            <div style="font-family:'Playfair Display',serif;font-size:0.82rem;font-weight:600;border-bottom:1.5px solid #b8860b;padding-bottom:3px;margin-bottom:8px">Firmas</div>
            ${firmasHtml}
          </div>

        </div>
      </div>

      <div style="margin-top:10px;padding-top:6px;border-top:1px solid #eee;font-size:0.55rem;color:#ccc;text-align:center;letter-spacing:0.04em">

  `;

  document.getElementById('print-content').innerHTML = html;
  document.getElementById('print-preview').style.display = 'block';
}

function openPdf() {
  openPrint();
  // Pequeño delay para que el DOM se pinte antes de lanzar impresión
  setTimeout(() => { window.print(); }, 300);
}

function closePrint() {
  document.getElementById('print-preview').style.display = 'none';
}

// ─── UTIL ───────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── INIT ───────────────────────────────────────────────
buildDenomGrid();
renderPersonas();
addSobre(); // start with one row
